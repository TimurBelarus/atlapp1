<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка на доставку</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 20px; text-align: center; }
        .step { margin-bottom: 20px; }
        .step-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .options { display: grid; gap: 8px; }
        .option {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
        }
        .option.selected {
            border-color: var(--tg-theme-button-color, #3390ec);
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Заявка на доставку</h1>
        <div id="app"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const WAREHOUSES = {
            "Москва": ["Коледино", "Электросталь", "Обухово"],
            "Регионы": ["Тула", "Рязань", "Казань", "Краснодар", "Невинномысск", "Екатеринбург", "Самара", "Котовск", "Шушары"]
        };

        let step = 0;
        const data = {
            org_type: "",
            direction: "",
            warehouse: "",
            delivery_date: "",
            pickup: "",
            cargo_type: "",
            volume: 0,
            volume_text: "",
            phone: ""
        };

        const steps = [
            { title: "1. Тип организации", type: "options", key: "org_type", options: ["ИП", "ООО", "Физ.лицо"] },
            { title: "2. Направление", type: "options", key: "direction", options: ["Москва", "Регионы"] },
            { title: "3. Склад", type: "dynamic", key: "warehouse" },
            { title: "4. Дата поставки", type: "date", key: "delivery_date" },
            { title: "5. Забор груза", type: "options", key: "pickup", options: ["Да", "Нет"] },
            { title: "6. Тип груза", type: "options", key: "cargo_type", options: ["Коробки", "Паллеты"] },
            { title: "7. Объём", type: "number", key: "volume" },
            { title: "8. Телефон", type: "phone", key: "phone" },
            { title: "Проверьте данные", type: "confirm" }
        ];

        function render() {
            const app = document.getElementById('app');
            const s = steps[step];
            
            let html = `<div class="step"><div class="step-title">${s.title}</div>`;
            
            if (s.type === "options") {
                html += '<div class="options">';
                s.options.forEach(opt => {
                    const selected = data[s.key] === opt ? "selected" : "";
                    html += `<div class="option ${selected}" onclick="select('${s.key}', '${opt}')">${opt}</div>`;
                });
                html += '</div>';
            } else if (s.type === "dynamic") {
                html += '<div class="options">';
                const opts = WAREHOUSES[data.direction] || [];
                opts.forEach(opt => {
                    const selected = data[s.key] === opt ? "selected" : "";
                    html += `<div class="option ${selected}" onclick="select('${s.key}', '${opt}')">${opt}</div>`;
                });
                html += '</div>';
            } else if (s.type === "date") {
                html += `<input type="date" id="dateInput" onchange="select('${s.key}', this.value)">`;
                setTimeout(() => {
                    const min = new Date().toISOString().split('T')[0];
                    document.getElementById('dateInput').min = min;
                }, 100);
            } else if (s.type === "number") {
                html += `<input type="number" id="numInput" min="1" placeholder="Введите число" onchange="select('${s.key}', this.value)">`;
            } else if (s.type === "phone") {
                html += `<input type="tel" id="phoneInput" placeholder="+7 (___) ___-__-__" onchange="select('${s.key}', this.value)">`;
            } else if (s.type === "confirm") {
                html += '<div style="line-height: 1.8; font-size: 14px;">';
                Object.entries(data).forEach(([k, v]) => {
                    if (v) html += `<div><b>${k}:</b> ${v}</div>`;
                });
                html += '</div>';
            }
            
            html += '</div>';
            
            if (step > 0) {
                html += `<button class="btn" onclick="prev()" style="background: #888; margin-top: 10px;">← Назад</button>`;
            }
            
            const canNext = data[s.key] || step === steps.length - 1;
            html += `<button class="btn" ${!canNext ? 'disabled' : ''} onclick="next()">
                ${step === steps.length - 1 ? "✅ Отправить заявку" : "Далее →"}
            </button>`;
            
            app.innerHTML = html;
        }

        function select(key, value) {
            data[key] = value;
            if (key === "volume") {
                const ct = data.cargo_type;
                data.volume_text = ct === "Коробки" ? `${value} Коробки` : `${value} Паллет`;
            }
            render();
        }

        function next() {
            if (step < steps.length - 1) {
                step++;
                render();
            } else {
                submitData();
            }
        }

        function prev() {
            if (step > 0) {
                step--;
                render();
            }
        }

        function submitData() {
            const payload = JSON.stringify(data);
            tg.sendData(payload);
            document.getElementById('app').innerHTML = '<div style="text-align: center; padding: 40px;"><div style="font-size: 48px;">✅</div><h2>Заявка отправлена!</h2></div>';
            setTimeout(() => tg.close(), 2000);
        }

        render();
    </script>
</body>
</html>
